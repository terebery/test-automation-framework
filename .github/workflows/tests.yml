name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Allure package
        run: python -m pip show allure-pytest

      - name: Prepare allure results directory
        run: |
          rm -rf allure-results
          mkdir -p allure-results
          echo "Environment=GitHub Actions" > allure-results/environment.properties
          echo "Python=3.11" >> allure-results/environment.properties

      - name: Run tests
        run: |
          pytest -vv -ra -p no:allure_pytest_bdd 2>&1 | tee pytest-output.log
          test ${PIPESTATUS[0]} -eq 0

      - name: Debug allure results content
        if: always()
        run: |
          echo "Allure files:" 
          find allure-results -maxdepth 2 -type f | sort
          echo "result.json count: $(find allure-results -name '*-result.json' | wc -l)"
          echo "container.json count: $(find allure-results -name '*-container.json' | wc -l)"

      - name: Validate allure results are present
        if: always()
        run: |
          test "$(find allure-results -name '*-result.json' | wc -l)" -gt 0

      - name: Upload allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: |
            allure-results
            pytest-output.log

  deploy-report:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - uses: actions/checkout@v3

      - name: Download allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: .

      - name: Debug downloaded results
        run: |
          echo "Downloaded files:"
          find allure-results -maxdepth 2 -type f | sort || true
          echo "result.json count: $(find allure-results -name '*-result.json' | wc -l)"

      - name: Load Allure report history
        uses: actions/checkout@v3
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_history: allure-history
          gh_pages: gh-pages

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history